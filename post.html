<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MW4 News - Noticia</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #000000 0%, #0a1f0a 100%);
            padding: 2rem;
            text-align: center;
            border-bottom: 3px solid #4caf50;
        }

        .logo {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 3px;
            color: #ffffff;
        }

        .logo span {
            color: #4caf50;
            font-size: 2.2rem;
        }

        .logo a {
            text-decoration: none;
            color: inherit;
        }

        .nav-bar {
            background: #111;
            padding: 0.8rem 2rem;
            border-bottom: 1px solid #1e2a1e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .back-home {
            color: #4caf50;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s;
        }

        .back-home:hover {
            transform: translateX(-5px);
            color: #6dbf6d;
        }

        .share-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .share-btn {
            background: transparent;
            border: 1px solid #4caf50;
            color: #4caf50;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.8rem;
        }

        .share-btn:hover {
            background: #4caf50;
            color: black;
        }

        .post-container {
            max-width: 900px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        .post-cover-wrap {
            position: relative;
            margin-bottom: 2rem;
        }

        .post-cover {
            width: 100%;
            max-height: 450px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid #1e2a1e;
            display: block;
        }

        .post-updated-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: linear-gradient(135deg, #ff6f00, #ffab00);
            color: #000;
            font-size: 0.72rem;
            font-weight: 900;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 5px 12px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 3px 12px rgba(255,111,0,0.6);
        }

        .post-tag {
            display: inline-block;
            padding: 0.3rem 1.2rem;
            font-size: 0.8rem;
            font-weight: 700;
            border-radius: 20px;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .tag-oficial { background: #4caf50; color: #000; }
        .tag-noticia { background: #2196f3; color: #fff; }
        .tag-rumor { background: #ff9800; color: #000; }
        .tag-review  { background: #9c27b0; color: #fff; }
        .tag-mapas   { background: #1b5e20; color: #69f0ae; }
        .tag-clases  { background: #1a237e; color: #c5cae9; }
        .tag-armas   { background: #b71c1c; color: #ffcdd2; }
        .tag-modos   { background: #4a148c; color: #e1bee7; }
        .tag-warzone { background: #e65100; color: #ffe0b2; }
        .tag-dmz     { background: #33691e; color: #dcedc8; }
        .tag-campana { background: #783500; color: #ffd54f; }
        .tag-skins   { background: #880e4f; color: #fce4ec; }
        .tag-informacion  { background: #006064; color: #80deea; }
        .tag-curiosidades { background: #37474f; color: #b0bec5; }
        .tag-ediciones    { background: #4a148c; color: #ea80fc; }

        .post-title {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            color: #ffffff;
            line-height: 1.3;
        }

        .post-date {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #4caf50;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #1e2a1e;
        }

        .post-content {
            font-size: 1.1rem;
            line-height: 1.8;
        }

        .post-content p {
            margin-bottom: 1.2rem;
        }

        /* br dobles son saltos de párrafo del editor — no ocultarlos */

        .post-content h2 {
            color: #4caf50;
            margin: 1.5rem 0 1rem;
        }

        .post-content h3 {
            color: #4caf50;
            margin: 1.2rem 0 0.8rem;
        }

        .post-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 1.5rem 0;
            border: 1px solid #1e2a1e;
        }

        .post-content ul, .post-content ol {
            margin: 1rem 0 1rem 2rem;
        }

        .post-content a {
            color: #4caf50;
            text-decoration: none;
        }

        .post-content a:hover {
            text-decoration: underline;
        }

        .post-content blockquote {
            border-left: 4px solid #4caf50;
            padding-left: 1.5rem;
            margin: 1.5rem 0;
            font-style: italic;
            color: #cccccc;
        }

        .post-content iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 12px;
            margin: 1.5rem 0;
            border: none;
        }

        /* ===== GALERÍA / CARRUSEL ===== */
        .mw4-gallery {
            position: relative;
            width: 100%;
            margin: 1.8rem 0;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid #1e2a1e;
            background: #050505;
            user-select: none;
        }
        .gallery-track-wrap {
            overflow: hidden;
            border-radius: 12px;
        }
        .gallery-track {
            display: flex;
            transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        .gallery-slide {
            flex: 0 0 100%;
            max-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050505;
            cursor: zoom-in;
        }
        .gallery-slide img {
            width: 100%;
            height: 100%;
            max-height: 500px;
            object-fit: contain;
            border-radius: 0;
            border: none;
            margin: 0;
            display: block;
        }
        .gallery-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.65);
            border: 1px solid rgba(76,175,80,0.4);
            color: #4caf50;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.9rem;
            z-index: 5;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }
        .gallery-arrow:hover { background: rgba(76,175,80,0.25); border-color: #4caf50; }
        .gallery-arrow.prev { left: 10px; }
        .gallery-arrow.next { right: 10px; }
        .gallery-arrow.hidden { opacity: 0; pointer-events: none; }
        .gallery-dots {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 5;
        }
        .gallery-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }
        .gallery-dot.active { background: #4caf50; transform: scale(1.3); }
        .gallery-counter {
            position: absolute;
            top: 10px;
            right: 12px;
            background: rgba(0,0,0,0.6);
            color: #aaa;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
            z-index: 5;
            backdrop-filter: blur(4px);
        }
        .gallery-counter span { color: #4caf50; }

        /* Lightbox */
        .mw4-lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.93);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }
        .mw4-lightbox.open { opacity: 1; pointer-events: all; }
        .lightbox-img-wrap {
            max-width: 92vw;
            max-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .lightbox-img-wrap img {
            max-width: 92vw;
            max-height: 88vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.8);
        }
        .lightbox-close {
            position: fixed;
            top: 16px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(76,175,80,0.4);
            color: #4caf50;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            z-index: 10000;
        }
        .lightbox-arrow {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(76,175,80,0.35);
            color: #4caf50;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            z-index: 10000;
            transition: background 0.2s;
        }
        .lightbox-arrow:hover { background: rgba(76,175,80,0.2); }
        .lightbox-arrow.prev { left: 16px; }
        .lightbox-arrow.next { right: 16px; }
        .lightbox-counter {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            color: #aaa;
            font-size: 0.75rem;
            z-index: 10000;
        }

        .loader {
            text-align: center;
            padding: 3rem;
        }

        .loader i {
            font-size: 3rem;
            color: #4caf50;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .error-message {
            text-align: center;
            padding: 3rem;
            color: #ff6b6b;
        }

        footer {
            text-align: center;
            padding: 2rem;
            background: #050505;
            border-top: 1px solid #1e2a1e;
            color: #666;
            font-size: 0.8rem;
        }

        /* ===== RESPONSIVE MÓVIL ===== */
        @media (max-width: 768px) {
            .post-title { 
                font-size: 1.5rem; 
            }
            
            .post-container { 
                padding: 0 1rem; 
                margin: 1.5rem auto;
            }
            
            .post-content {
                font-size: 1rem;
            }
            
            .post-content iframe {
                min-height: 200px;
            }
            
            .share-buttons { 
                justify-content: center;
                gap: 0.5rem;
            }
            
            .nav-bar { 
                flex-direction: column; 
                text-align: center; 
                gap: 0.5rem;
                padding: 0.8rem 1rem;
            }
            
            .share-btn {
                padding: 0.3rem 0.7rem;
                font-size: 0.7rem;
            }
            
            .post-cover {
                max-height: 250px;
            }
            
            .post-tag {
                font-size: 0.7rem;
            }
        }

        /* ===== ENTRADAS RELACIONADAS ===== */
        .related-section {
            max-width: 900px;
            margin: 3rem auto 2rem;
            padding: 0 2rem;
            border-top: 1px solid #1e2a1e;
            padding-top: 2.5rem;
        }
        .related-title {
            font-size: 1rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: #4caf50;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .related-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(76,175,80,0.2);
        }
        .related-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }
        .related-card {
            background: linear-gradient(135deg, rgba(17,17,17,0.95), rgba(10,10,10,0.95));
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(76,175,80,0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            text-decoration: none;
        }
        .related-card:hover {
            transform: translateY(-4px);
            border-color: #4caf50;
            box-shadow: 0 8px 20px rgba(76,175,80,0.18);
        }
        .related-card-img {
            width: 100%;
            height: 130px;
            object-fit: cover;
            object-position: center top;
            display: block;
        }
        .related-card-body {
            padding: 0.75rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }
        .related-card-tag {
            font-size: 0.5rem;
            font-weight: 700;
            border-radius: 20px;
            padding: 0.1rem 0.5rem;
            text-transform: uppercase;
            align-self: flex-start;
        }
        .related-card-title {
            font-size: 0.78rem;
            font-weight: 700;
            color: #e0e0e0;
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .related-card-date {
            font-size: 0.58rem;
            color: #4caf50;
            margin-top: auto;
        }
        @media (max-width: 600px) {
            .related-grid { grid-template-columns: 1fr 1fr; }
            .related-section { padding: 0 1rem; padding-top: 2rem; margin-top: 2rem; }
            .related-card-img { height: 100px; }
        }
        @media (max-width: 380px) {
            .related-grid { grid-template-columns: 1fr; }
        }

        /* ===== SECCIÓN DISQUS ===== */
        .disqus-section {
            max-width: 900px;
            margin: 2.5rem auto 0;
            padding: 0 2rem 2rem;
            border-top: 1px solid #1e2a1e;
        }

        .disqus-title {
            font-size: 1rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: #4caf50;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            padding-top: 2.5rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .disqus-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(76,175,80,0.2);
        }

        /* Forzar fondo oscuro en el iframe de Disqus */
        #disqus_thread {
            background: transparent;
            color-scheme: dark;
        }

        @media (max-width: 600px) {
            .disqus-section {
                padding: 0 1rem 2rem;
            }
            .disqus-title {
                padding-top: 2rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <h1 class="logo"><a href="index.html">MODERN WARFARE <span>4</span></a></h1>
    </div>
</header>

<div class="nav-bar">
    <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Volver al inicio</a>
    <div class="share-buttons">
        <button class="share-btn" id="shareTwitter"><i class="fab fa-twitter"></i> Twitter</button>
        <button class="share-btn" id="shareFacebook"><i class="fab fa-facebook"></i> Facebook</button>
        <button class="share-btn" id="shareWhatsApp"><i class="fab fa-whatsapp"></i> WhatsApp</button>
        <button class="share-btn" id="copyLink"><i class="fas fa-link"></i> Copiar enlace</button>
    </div>
</div>

<div class="post-container" id="postContainer">
    <div class="loader"><i class="fas fa-circle-notch"></i> Cargando noticia...</div>
</div>

<div id="relatedSection"></div>

<!-- ===== COMENTARIOS DISQUS ===== -->
<div class="disqus-section">
    <div class="disqus-title"><i class="fas fa-comments"></i> Comentarios</div>
    <div id="disqus_thread"></div>
</div>

<footer>
    <p>Modern Warfare 4 © 2026 - Fan Blog no oficial | <i class="fas fa-skull"></i> Task Force 141</p>
</footer>

<script>
    // Configuración - Usa la URL completa del JSON
    const POSTS_URL = 'https://raw.githubusercontent.com/DastanFC/MW4/main/posts.json';
    let currentPost = null;

    function getPostIdFromURL() {
        const params = new URLSearchParams(window.location.search);
        return params.get('id');
    }

    function procesarContenido(raw) {
        if (!raw) return '';

        // Detectar si ya es HTML del editor WYSIWYG (nuevo admin)
        const esHTML = /<[a-zA-Z][^>]*>/.test(raw);

        if (esHTML) {
            // Ya viene con etiquetas HTML — solo asegurarse de convertir URLs de YT sueltas que no sean ya iframes
            return raw.replace(
                /(?<!=["'])(?<![/]embed[/])https?:\/\/(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)([^\s<"]*)/gi,
                (match, videoId) =>
                    `<iframe width="100%" style="aspect-ratio:16/9;border-radius:12px;border:none;" src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>`
            );
        }

        // Contenido de texto plano / markdown básico (posts viejos)

        // Markdown imagen: ![alt](url)
        raw = raw.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,
            (_, alt, url) => `\n<img src="${url}" alt="${alt}" style="max-width:100%;border-radius:8px;margin:1rem 0;">\n`
        );

        // URLs de YouTube sueltas
        raw = raw.replace(
            /https?:\/\/(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)([^\s]*)/gi,
            (match, videoId) =>
                `\n<iframe width="100%" style="aspect-ratio:16/9;border-radius:12px;border:none;" src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>\n`
        );

        // Markdown básico: **negrita** *cursiva*
        raw = raw.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        raw = raw.replace(/\*(.+?)\*/g, '<em>$1</em>');

        // Doble salto de línea → párrafos; salto simple → <br>
        const parrafos = raw.split(/\n{2,}/);
        raw = parrafos.map(bloque => {
            bloque = bloque.trim();
            if (!bloque) return '';
            if (/^<(img|iframe|h[1-6]|ul|ol|li|blockquote)/i.test(bloque)) return bloque;
            return '<p>' + bloque.replace(/\n/g, '<br>') + '</p>';
        }).filter(Boolean).join('\n');

        return raw;
    }

    function convertYouTubeUrlsToEmbed(html) {
        return procesarContenido(html);
    }

    async function loadPost() {
        const postId = getPostIdFromURL();
        const container = document.getElementById('postContainer');
        
        if (!postId) {
            container.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-triangle"></i> No se especificó ninguna noticia.</div>';
            return;
        }
        
        try {
            const response = await fetch(POSTS_URL + '?t=' + new Date().getTime());
            if (!response.ok) throw new Error('No se pudo cargar posts.json');
            
            const posts = await response.json();
            currentPost = posts.find(p => p.id == postId);
            
            if (!currentPost) {
                container.innerHTML = '<div class="error-message"><i class="fas fa-skull"></i> Noticia no encontrada.</div>';
                return;
            }
            
            document.title = `${currentPost.title} - MW4 News`;
            
            const tagClass = {
                'oficial':      'tag-oficial',
                'noticia':      'tag-noticia',
                'rumor':        'tag-rumor',
                'informacion':  'tag-informacion',
                'curiosidades': 'tag-curiosidades',
                'ediciones':    'tag-ediciones',
                'review':       'tag-review',
                'mapas':        'tag-mapas',
                'clases':       'tag-clases',
                'armas':        'tag-armas',
                'modos':        'tag-modos',
                'warzone':      'tag-warzone',
                'dmz':          'tag-dmz',
                'campana':      'tag-campana',
                'skins':        'tag-skins'
            }[currentPost.tag] || 'tag-noticia';
            
            const dateObj = new Date(currentPost.date);
            const formattedDate = dateObj.toLocaleDateString('es-ES', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
            
            let contentHTML = procesarContenido(currentPost.content || '');
            if (!contentHTML) contentHTML = '<p>Contenido no disponible</p>';
            
            const updatedBadge = currentPost.updated
                ? `<div class="post-updated-badge">🔄 Nueva información añadida</div>`
                : '';

            container.innerHTML = `
                ${currentPost.image ? `
                <div class="post-cover-wrap">
                    <img class="post-cover" src="${currentPost.image}" alt="${currentPost.title}" onerror="this.style.display='none'">
                    ${updatedBadge}
                </div>` : (currentPost.updated ? `<div style="margin-bottom:1rem;">${updatedBadge.replace('position:absolute','position:relative')}</div>` : '')}
                <span class="post-tag ${tagClass}">${currentPost.tag.toUpperCase()}</span>
                <h1 class="post-title">${escapeHtml(currentPost.title)}</h1>
                <div class="post-date"><i class="far fa-calendar-alt"></i> ${formattedDate}</div>
                <div class="post-content">${contentHTML}</div>
            `;

            // Cargar widgets de Twitter si hay tweets incrustados
            if (contentHTML.includes('twitter-tweet')) {
                if (window.twttr) {
                    twttr.widgets.load();
                } else {
                    const s = document.createElement('script');
                    s.src = 'https://platform.twitter.com/widgets.js';
                    s.async = true;
                    document.body.appendChild(s);
                }
            }

            // Entradas relacionadas
            renderRelatedPosts(posts, currentPost.id, currentPost.tag);

            // Cargar Disqus una vez el post está renderizado
            loadDisqus();
            
        } catch (error) {
            console.error('Error:', error);
            container.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-triangle"></i> Error cargando la noticia.</div>';
        }
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function shareOnTwitter() {
        if (!currentPost) return;
        const url = encodeURIComponent(window.location.href);
        const text = encodeURIComponent(currentPost.title);
        window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
    }
    
    function shareOnFacebook() {
        const url = encodeURIComponent(window.location.href);
        window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, '_blank');
    }
    
    function shareOnWhatsApp() {
        const url = encodeURIComponent(window.location.href);
        const text = encodeURIComponent(currentPost.title);
        window.open(`https://wa.me/?text=${text}%20${url}`, '_blank');
    }
    
    function copyLink() {
        navigator.clipboard.writeText(window.location.href).then(() => {
            alert('✅ Enlace copiado al portapapeles');
        }).catch(() => {
            alert('❌ No se pudo copiar el enlace');
        });
    }
    
    const TAG_CLASS_R = {'oficial':'tag-oficial','noticia':'tag-noticia','rumor':'tag-rumor','review':'tag-review','mapas':'tag-mapas','clases':'tag-clases','armas':'tag-armas','modos':'tag-modos','warzone':'tag-warzone','dmz':'tag-dmz','campana':'tag-campana','skins':'tag-skins','informacion':'tag-informacion','curiosidades':'tag-curiosidades','ediciones':'tag-ediciones'};
    const TAG_ICON_R  = {'oficial':'✓','noticia':'📰','rumor':'🔮','review':'⭐','mapas':'🗺️','clases':'🎖️','armas':'🔫','modos':'🎮','warzone':'🪂','dmz':'🏴','campana':'⚔️','skins':'🎨','informacion':'📡','curiosidades':'🧠','ediciones':'💎'};

    function formatDateShort(ds) {
        const date = new Date(ds), diff = Math.floor((Date.now() - date) / 86400000);
        if (diff === 0) return 'Hoy';
        if (diff === 1) return 'Ayer';
        if (diff < 7) return `Hace ${diff} días`;
        return date.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
    }

    function renderRelatedPosts(allPosts, currentId, currentTag) {
        const section = document.getElementById('relatedSection');
        if (!section) return;

        // Prioridad: mismo tag, luego el resto — excluir el actual
        const sameTag = allPosts.filter(p => p.id != currentId && p.tag === currentTag);
        const others  = allPosts.filter(p => p.id != currentId && p.tag !== currentTag);
        const pool    = [...sameTag, ...others].slice(0, 3);

        if (pool.length === 0) return;

        section.innerHTML = `
        <div class="related-section">
            <h2 class="related-title"><i class="fas fa-layer-group"></i> Entradas relacionadas</h2>
            <div class="related-grid">
                ${pool.map(p => {
                    const tc = TAG_CLASS_R[p.tag] || 'tag-noticia';
                    const ti = TAG_ICON_R[p.tag] || '📰';
                    const img = p.image || 'https://via.placeholder.com/400x180/1a1a1a/4caf50?text=MW4';
                    return `
                    <a class="related-card" href="post.html?id=${p.id}">
                        <img class="related-card-img" src="${img}" alt="${escapeHtml(p.title)}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x180/1a1a1a/4caf50?text=MW4'">
                        <div class="related-card-body">
                            <span class="related-card-tag ${tc}">${ti} ${p.tag.toUpperCase()}</span>
                            <div class="related-card-title">${escapeHtml(p.title)}</div>
                            <div class="related-card-date"><i class="far fa-calendar-alt"></i> ${formatDateShort(p.date)}</div>
                        </div>
                    </a>`;
                }).join('')}
            </div>
        </div>`;
    }

    document.getElementById('shareTwitter').addEventListener('click', shareOnTwitter);
    document.getElementById('shareFacebook').addEventListener('click', shareOnFacebook);
    document.getElementById('shareWhatsApp').addEventListener('click', shareOnWhatsApp);
    document.getElementById('copyLink').addEventListener('click', copyLink);
    
    loadPost();
</script>

<script>
/* ===== GALERÍA: carrusel + lightbox ===== */

function initGalleries() {
    document.querySelectorAll('.mw4-gallery').forEach(gallery => {
        // Ya inicializado
        if (gallery.dataset.init) return;
        gallery.dataset.init = '1';

        const rawImgs = Array.from(gallery.querySelectorAll('img'));
        if (rawImgs.length === 0) return;
        if (rawImgs.length === 1) {
            // Una sola imagen: mostrar normal sin carrusel
            rawImgs[0].style.cssText = 'max-width:100%;border-radius:8px;cursor:zoom-in;';
            rawImgs[0].addEventListener('click', () => openLightbox(rawImgs.map(i=>i.src), 0));
            return;
        }

        const srcs = rawImgs.map(i => i.src);
        let current = 0;

        // Construir estructura del carrusel
        gallery.innerHTML = `
            <div class="gallery-track-wrap">
                <div class="gallery-track" id="gt_${gallery.dataset.gid = Date.now()}">
                    ${srcs.map(src => `<div class="gallery-slide"><img src="${src}" alt=""></div>`).join('')}
                </div>
            </div>
            <button class="gallery-arrow prev" id="gprev_${gallery.dataset.gid}"><i class="fas fa-chevron-left"></i></button>
            <button class="gallery-arrow next" id="gnext_${gallery.dataset.gid}"><i class="fas fa-chevron-right"></i></button>
            <div class="gallery-dots">${srcs.map((_,i) => `<div class="gallery-dot${i===0?' active':''}" data-i="${i}"></div>`).join('')}</div>
            <div class="gallery-counter"><span id="gcur_${gallery.dataset.gid}">1</span> / ${srcs.length}</div>
        `;

        const track  = gallery.querySelector('.gallery-track');
        const prev   = gallery.querySelector('.gallery-arrow.prev');
        const next   = gallery.querySelector('.gallery-arrow.next');
        const dots   = gallery.querySelectorAll('.gallery-dot');
        const curEl  = gallery.querySelector('.gallery-counter span');

        function goTo(n) {
            current = Math.max(0, Math.min(n, srcs.length - 1));
            track.style.transform = `translateX(-${current * 100}%)`;
            dots.forEach((d,i) => d.classList.toggle('active', i === current));
            curEl.textContent = current + 1;
            prev.classList.toggle('hidden', current === 0);
            next.classList.toggle('hidden', current === srcs.length - 1);
        }

        prev.addEventListener('click', () => goTo(current - 1));
        next.addEventListener('click', () => goTo(current + 1));
        dots.forEach(d => d.addEventListener('click', () => goTo(+d.dataset.i)));

        // Click en imagen → lightbox
        gallery.querySelectorAll('.gallery-slide img').forEach((img, i) => {
            img.addEventListener('click', () => openLightbox(srcs, i));
        });

        // Swipe táctil
        let touchX = 0;
        gallery.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
        gallery.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - touchX;
            if (Math.abs(dx) > 40) goTo(dx < 0 ? current + 1 : current - 1);
        }, { passive: true });

        goTo(0);
    });
}

/* ── Lightbox ── */
let lb = null;
function buildLightbox() {
    if (lb) return;
    lb = document.createElement('div');
    lb.className = 'mw4-lightbox';
    lb.innerHTML = `
        <button class="lightbox-close" id="lbClose"><i class="fas fa-times"></i></button>
        <button class="lightbox-arrow prev" id="lbPrev"><i class="fas fa-chevron-left"></i></button>
        <div class="lightbox-img-wrap"><img id="lbImg" src="" alt=""></div>
        <button class="lightbox-arrow next" id="lbNext"><i class="fas fa-chevron-right"></i></button>
        <div class="lightbox-counter" id="lbCounter"></div>
    `;
    document.body.appendChild(lb);
    lb.querySelector('#lbClose').addEventListener('click', closeLightbox);
    lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
    document.addEventListener('keydown', e => {
        if (!lb.classList.contains('open')) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft')  lbGo(lbCurrent - 1);
        if (e.key === 'ArrowRight') lbGo(lbCurrent + 1);
    });
}

let lbSrcs = [], lbCurrent = 0;
function openLightbox(srcs, idx) {
    buildLightbox();
    lbSrcs = srcs; lbCurrent = idx;
    lbGo(idx);
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
    lb.querySelector('#lbPrev').addEventListener('click', () => lbGo(lbCurrent - 1));
    lb.querySelector('#lbNext').addEventListener('click', () => lbGo(lbCurrent + 1));
}
function closeLightbox() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
}
function lbGo(n) {
    lbCurrent = Math.max(0, Math.min(n, lbSrcs.length - 1));
    lb.querySelector('#lbImg').src = lbSrcs[lbCurrent];
    lb.querySelector('#lbCounter').textContent = `${lbCurrent + 1} / ${lbSrcs.length}`;
    lb.querySelector('#lbPrev').style.display = lbCurrent === 0 ? 'none' : '';
    lb.querySelector('#lbNext').style.display = lbCurrent === lbSrcs.length - 1 ? 'none' : '';
}

// Llamar después de que loadPost() renderice el contenido
const _origLoadPost = loadPost;
window.addEventListener('DOMContentLoaded', () => {
    const observer = new MutationObserver(() => {
        if (document.querySelectorAll('.mw4-gallery').length > 0) initGalleries();
    });
    observer.observe(document.getElementById('postContainer'), { childList: true, subtree: true });
});
</script>

<script>
    // Disqus se carga después de que loadPost() termine de renderizar el contenido
    function loadDisqus() {
        if (typeof DISQUS !== 'undefined') {
            // Si ya estaba cargado (navegación SPA), resetear
            DISQUS.reset({
                reload: true,
                config: function () {
                    this.page.url = window.location.href;
                    this.page.identifier = window.location.pathname + window.location.search;
                }
            });
            return;
        }

        var disqus_config = function () {
            this.page.url = window.location.href;
            this.page.identifier = window.location.pathname + window.location.search;
        };

        (function () {
            var d = document, s = d.createElement('script');
            s.src = 'https://mw4.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            s.async = true;
            (d.head || d.body).appendChild(s);
        })();
    }

    // Inyectar variable de tema oscuro antes de que cargue Disqus
    window.disqus_config = function () {
        this.page.url = window.location.href;
        this.page.identifier = window.location.pathname + window.location.search;
    };
</script>
