<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MW4 News - Noticia</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #000000 0%, #0a1f0a 100%);
            padding: 2rem;
            text-align: center;
            border-bottom: 3px solid #4caf50;
        }

        .logo {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 3px;
            color: #ffffff;
        }

        .logo span {
            color: #4caf50;
            font-size: 2.2rem;
        }

        .logo a {
            text-decoration: none;
            color: inherit;
        }

        .nav-bar {
            background: #111;
            padding: 0.8rem 2rem;
            border-bottom: 1px solid #1e2a1e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .back-home {
            color: #4caf50;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s;
        }

        .back-home:hover {
            transform: translateX(-5px);
            color: #6dbf6d;
        }

        .share-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .share-btn {
            background: transparent;
            border: 1px solid #4caf50;
            color: #4caf50;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.8rem;
        }

        .share-btn:hover {
            background: #4caf50;
            color: black;
        }

        .post-container {
            max-width: 900px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        .post-cover {
            width: 100%;
            max-height: 450px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 2rem;
            border: 1px solid #1e2a1e;
        }

        .post-tag {
            display: inline-block;
            padding: 0.3rem 1.2rem;
            font-size: 0.8rem;
            font-weight: 700;
            border-radius: 20px;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .tag-oficial { background: #4caf50; color: #000; }
        .tag-noticia { background: #2196f3; color: #fff; }
        .tag-rumor { background: #ff9800; color: #000; }
        .tag-review  { background: #9c27b0; color: #fff; }
        .tag-mapas   { background: #1b5e20; color: #69f0ae; }
        .tag-clases  { background: #1a237e; color: #c5cae9; }
        .tag-armas   { background: #b71c1c; color: #ffcdd2; }
        .tag-modos   { background: #4a148c; color: #e1bee7; }
        .tag-warzone { background: #e65100; color: #ffe0b2; }
        .tag-dmz     { background: #33691e; color: #dcedc8; }
        .tag-campana { background: #783500; color: #ffd54f; }
        .tag-skins   { background: #880e4f; color: #fce4ec; }
        .tag-informacion  { background: #006064; color: #80deea; }
        .tag-curiosidades { background: #37474f; color: #b0bec5; }
        .tag-ediciones    { background: #4a148c; color: #ea80fc; }

        .post-title {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            color: #ffffff;
            line-height: 1.3;
        }

        .post-date {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #4caf50;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #1e2a1e;
        }

        .post-content {
            font-size: 1.1rem;
            line-height: 1.8;
        }

        .post-content p {
            margin-bottom: 1.2rem;
        }

        /* br dobles son saltos de párrafo del editor — no ocultarlos */

        .post-content h2 {
            color: #4caf50;
            margin: 1.5rem 0 1rem;
        }

        .post-content h3 {
            color: #4caf50;
            margin: 1.2rem 0 0.8rem;
        }

        .post-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 1.5rem 0;
            border: 1px solid #1e2a1e;
        }

        .post-content ul, .post-content ol {
            margin: 1rem 0 1rem 2rem;
        }

        .post-content a {
            color: #4caf50;
            text-decoration: none;
        }

        .post-content a:hover {
            text-decoration: underline;
        }

        .post-content blockquote {
            border-left: 4px solid #4caf50;
            padding-left: 1.5rem;
            margin: 1.5rem 0;
            font-style: italic;
            color: #cccccc;
        }

        .post-content iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 12px;
            margin: 1.5rem 0;
            border: none;
        }

        .loader {
            text-align: center;
            padding: 3rem;
        }

        .loader i {
            font-size: 3rem;
            color: #4caf50;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .error-message {
            text-align: center;
            padding: 3rem;
            color: #ff6b6b;
        }

        footer {
            text-align: center;
            padding: 2rem;
            background: #050505;
            border-top: 1px solid #1e2a1e;
            color: #666;
            font-size: 0.8rem;
        }

        /* ===== RESPONSIVE MÓVIL ===== */
        @media (max-width: 768px) {
            .post-title { 
                font-size: 1.5rem; 
            }
            
            .post-container { 
                padding: 0 1rem; 
                margin: 1.5rem auto;
            }
            
            .post-content {
                font-size: 1rem;
            }
            
            .post-content iframe {
                min-height: 200px;
            }
            
            .share-buttons { 
                justify-content: center;
                gap: 0.5rem;
            }
            
            .nav-bar { 
                flex-direction: column; 
                text-align: center; 
                gap: 0.5rem;
                padding: 0.8rem 1rem;
            }
            
            .share-btn {
                padding: 0.3rem 0.7rem;
                font-size: 0.7rem;
            }
            
            .post-cover {
                max-height: 250px;
            }
            
            .post-tag {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <h1 class="logo"><a href="index.html">MODERN WARFARE <span>4</span></a></h1>
    </div>
</header>

<div class="nav-bar">
    <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Volver al inicio</a>
    <div class="share-buttons">
        <button class="share-btn" id="shareTwitter"><i class="fab fa-twitter"></i> Twitter</button>
        <button class="share-btn" id="shareFacebook"><i class="fab fa-facebook"></i> Facebook</button>
        <button class="share-btn" id="shareWhatsApp"><i class="fab fa-whatsapp"></i> WhatsApp</button>
        <button class="share-btn" id="copyLink"><i class="fas fa-link"></i> Copiar enlace</button>
    </div>
</div>

<div class="post-container" id="postContainer">
    <div class="loader"><i class="fas fa-circle-notch"></i> Cargando noticia...</div>
</div>

<footer>
    <p>Modern Warfare 4 © 2026 - Fan Blog no oficial | <i class="fas fa-skull"></i> Task Force 141</p>
</footer>

<script>
    // Configuración - Usa la URL completa del JSON
    const POSTS_URL = 'https://raw.githubusercontent.com/DastanFC/Modernwarfare4-2026/main/posts.json';
    let currentPost = null;

    function getPostIdFromURL() {
        const params = new URLSearchParams(window.location.search);
        return params.get('id');
    }

    function procesarContenido(raw) {
        if (!raw) return '';

        // Detectar si ya es HTML del editor WYSIWYG (nuevo admin)
        const esHTML = /<[a-zA-Z][^>]*>/.test(raw);

        if (esHTML) {
            // Ya viene con etiquetas HTML — solo asegurarse de convertir URLs de YT sueltas que no sean ya iframes
            return raw.replace(
                /(?<!=["'])(?<![/]embed[/])https?:\/\/(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)([^\s<"]*)/gi,
                (match, videoId) =>
                    `<iframe width="100%" style="aspect-ratio:16/9;border-radius:12px;border:none;" src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>`
            );
        }

        // Contenido de texto plano / markdown básico (posts viejos)

        // Markdown imagen: ![alt](url)
        raw = raw.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,
            (_, alt, url) => `\n<img src="${url}" alt="${alt}" style="max-width:100%;border-radius:8px;margin:1rem 0;">\n`
        );

        // URLs de YouTube sueltas
        raw = raw.replace(
            /https?:\/\/(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)([^\s]*)/gi,
            (match, videoId) =>
                `\n<iframe width="100%" style="aspect-ratio:16/9;border-radius:12px;border:none;" src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>\n`
        );

        // Markdown básico: **negrita** *cursiva*
        raw = raw.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        raw = raw.replace(/\*(.+?)\*/g, '<em>$1</em>');

        // Doble salto de línea → párrafos; salto simple → <br>
        const parrafos = raw.split(/\n{2,}/);
        raw = parrafos.map(bloque => {
            bloque = bloque.trim();
            if (!bloque) return '';
            if (/^<(img|iframe|h[1-6]|ul|ol|li|blockquote)/i.test(bloque)) return bloque;
            return '<p>' + bloque.replace(/\n/g, '<br>') + '</p>';
        }).filter(Boolean).join('\n');

        return raw;
    }

    function convertYouTubeUrlsToEmbed(html) {
        return procesarContenido(html);
    }

    async function loadPost() {
        const postId = getPostIdFromURL();
        const container = document.getElementById('postContainer');
        
        if (!postId) {
            container.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-triangle"></i> No se especificó ninguna noticia.</div>';
            return;
        }
        
        try {
            const response = await fetch(POSTS_URL + '?t=' + new Date().getTime());
            if (!response.ok) throw new Error('No se pudo cargar posts.json');
            
            const posts = await response.json();
            currentPost = posts.find(p => p.id == postId);
            
            if (!currentPost) {
                container.innerHTML = '<div class="error-message"><i class="fas fa-skull"></i> Noticia no encontrada.</div>';
                return;
            }
            
            document.title = `${currentPost.title} - MW4 News`;
            
            const tagClass = {
                'oficial':      'tag-oficial',
                'noticia':      'tag-noticia',
                'rumor':        'tag-rumor',
                'informacion':  'tag-informacion',
                'curiosidades': 'tag-curiosidades',
                'ediciones':    'tag-ediciones',
                'review':       'tag-review',
                'mapas':        'tag-mapas',
                'clases':       'tag-clases',
                'armas':        'tag-armas',
                'modos':        'tag-modos',
                'warzone':      'tag-warzone',
                'dmz':          'tag-dmz',
                'campana':      'tag-campana',
                'skins':        'tag-skins'
            }[currentPost.tag] || 'tag-noticia';
            
            const dateObj = new Date(currentPost.date);
            const formattedDate = dateObj.toLocaleDateString('es-ES', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
            
            let contentHTML = procesarContenido(currentPost.content || '');
            if (!contentHTML) contentHTML = '<p>Contenido no disponible</p>';
            
            container.innerHTML = `
                ${currentPost.image ? `<img class="post-cover" src="${currentPost.image}" alt="${currentPost.title}" onerror="this.style.display='none'">` : ''}
                <span class="post-tag ${tagClass}">${currentPost.tag.toUpperCase()}</span>
                <h1 class="post-title">${escapeHtml(currentPost.title)}</h1>
                <div class="post-date"><i class="far fa-calendar-alt"></i> ${formattedDate}</div>
                <div class="post-content">${contentHTML}</div>
            `;

            // Cargar widgets de Twitter si hay tweets incrustados
            if (contentHTML.includes('twitter-tweet')) {
                if (window.twttr) {
                    twttr.widgets.load();
                } else {
                    const s = document.createElement('script');
                    s.src = 'https://platform.twitter.com/widgets.js';
                    s.async = true;
                    document.body.appendChild(s);
                }
            }
            
        } catch (error) {
            console.error('Error:', error);
            container.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-triangle"></i> Error cargando la noticia.</div>';
        }
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function shareOnTwitter() {
        if (!currentPost) return;
        const url = encodeURIComponent(window.location.href);
        const text = encodeURIComponent(currentPost.title);
        window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
    }
    
    function shareOnFacebook() {
        const url = encodeURIComponent(window.location.href);
        window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, '_blank');
    }
    
    function shareOnWhatsApp() {
        const url = encodeURIComponent(window.location.href);
        const text = encodeURIComponent(currentPost.title);
        window.open(`https://wa.me/?text=${text}%20${url}`, '_blank');
    }
    
    function copyLink() {
        navigator.clipboard.writeText(window.location.href).then(() => {
            alert('✅ Enlace copiado al portapapeles');
        }).catch(() => {
            alert('❌ No se pudo copiar el enlace');
        });
    }
    
    document.getElementById('shareTwitter').addEventListener('click', shareOnTwitter);
    document.getElementById('shareFacebook').addEventListener('click', shareOnFacebook);
    document.getElementById('shareWhatsApp').addEventListener('click', shareOnWhatsApp);
    document.getElementById('copyLink').addEventListener('click', copyLink);
    
    loadPost();
</script>

</body>
</html>
