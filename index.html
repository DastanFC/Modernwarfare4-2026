<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MW4 News - Modern Warfare 4 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glowPulse {
            0% { text-shadow: 0 0 5px rgba(76, 175, 80, 0.3); }
            50% { text-shadow: 0 0 20px rgba(76, 175, 80, 0.8); }
            100% { text-shadow: 0 0 5px rgba(76, 175, 80, 0.3); }
        }

        header {
            background: linear-gradient(135deg, #000000 0%, #0a1f0a 100%);
            padding: 3rem 2rem;
            text-align: center;
            border-bottom: 3px solid #4caf50;
        }

        .logo {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 5px;
            color: #ffffff;
            animation: glowPulse 2s ease-in-out infinite;
        }

        .logo span {
            color: #4caf50;
            font-size: 3.5rem;
        }

        .logo a {
            text-decoration: none;
            color: inherit;
        }

        .tagline {
            color: #4caf50;
            font-weight: 700;
            letter-spacing: 3px;
            margin-top: 0.5rem;
            font-size: 0.8rem;
        }

        .filters {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            padding: 1.5rem;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #1e2a1e;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid #4caf50;
            color: #4caf50;
            padding: 0.5rem 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Roboto', sans-serif;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: #4caf50;
            color: #000000;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.5);
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            align-items: start;
        }

        .news-card {
            background: linear-gradient(135deg, rgba(17, 17, 17, 0.95), rgba(10, 10, 10, 0.95));
            backdrop-filter: blur(5px);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 1px solid rgba(76, 175, 80, 0.3);
            animation: fadeInUp 0.5s ease-out backwards;
            display: flex;
            flex-direction: column;
        }

        .news-card:hover {
            transform: translateY(-5px);
            border-color: #4caf50;
            box-shadow: 0 10px 25px rgba(76, 175, 80, 0.2);
        }

        .image-container {
            position: relative;
            overflow: hidden;
            /* Sin altura fija: la imagen se muestra completa */
        }

        .card-image {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s ease;
        }

        .news-card:hover .card-image {
            transform: scale(1.02);
        }

        .card-content {
            padding: 1rem;
        }

        .card-tag {
            display: inline-block;
            padding: 0.2rem 0.7rem;
            font-size: 0.6rem;
            font-weight: 700;
            border-radius: 20px;
            margin-bottom: 0.6rem;
            text-transform: uppercase;
        }

        .tag-oficial { background: #4caf50; color: #000; }
        .tag-noticia { background: #2196f3; color: #fff; }
        .tag-rumor { background: #ff9800; color: #000; }
        .tag-review { background: #9c27b0; color: #fff; }
        .tag-mapas   { background: #1b5e20; color: #69f0ae; }
        .tag-clases  { background: #1a237e; color: #c5cae9; }
        .tag-armas   { background: #b71c1c; color: #ffcdd2; }
        .tag-modos   { background: #4a148c; color: #e1bee7; }
        .tag-warzone { background: #e65100; color: #ffe0b2; }
        .tag-dmz     { background: #33691e; color: #dcedc8; }
        .tag-campana { background: #783500; color: #ffd54f; }
        .tag-skins   { background: #880e4f; color: #fce4ec; }
        .tag-informacion  { background: #006064; color: #80deea; }
        .tag-curiosidades { background: #37474f; color: #b0bec5; }
        .tag-ediciones    { background: #4a148c; color: #ea80fc; }

        /* Badge ACTUALIZADO */
        .updated-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: linear-gradient(135deg, #ff6f00, #ffab00);
            color: #000;
            font-size: 0.55rem;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 3px;
            box-shadow: 0 2px 8px rgba(255,111,0,0.5);
            z-index: 2;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            color: #ffffff;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-date {
            font-size: 0.65rem;
            color: #4caf50;
            margin-bottom: 0.5rem;
        }

        .card-excerpt {
            font-size: 0.75rem;
            color: #aaaaaa;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .load-more {
            display: block;
            margin: 1rem auto 3rem;
            background: transparent;
            border: 2px solid #4caf50;
            color: #4caf50;
            padding: 0.7rem 2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Roboto', sans-serif;
        }

        .load-more:hover {
            background: #4caf50;
            color: #000000;
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.4);
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            background: #050505;
            border-top: 1px solid #1e2a1e;
            color: #666;
            font-size: 0.7rem;
        }

        .loader {
            text-align: center;
            padding: 2rem;
            grid-column: 1/-1;
        }

        .loader i {
            font-size: 2rem;
            color: #4caf50;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1200px) {
            .news-grid { grid-template-columns: repeat(3, 1fr); gap: 1rem; }
        }

        @media (max-width: 900px) {
            .news-grid { grid-template-columns: repeat(2, 1fr); }
            .logo { font-size: 2rem; }
            .logo span { font-size: 2.5rem; }
        }

        @media (max-width: 600px) {
            .news-grid { grid-template-columns: 1fr; padding: 0 1rem; }
            .logo { font-size: 1.5rem; }
            .logo span { font-size: 2rem; }
            .tagline { font-size: 0.6rem; letter-spacing: 1px; }
            .filters { gap: 0.4rem; padding: 0.8rem; }
            .filter-btn { padding: 0.3rem 0.7rem; font-size: 0.65rem; }
            .card-title { font-size: 0.9rem; }
            .card-excerpt { font-size: 0.7rem; }
            /* image-container sin altura fija en mobile también */
            header { padding: 1.5rem; }
        }

        @media (max-width: 480px) {
            .news-grid { gap: 0.8rem; }
            .card-content { padding: 0.7rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <h1 class="logo"><a href="index.html">MODERN WARFARE <span>4</span></a></h1>
        <p class="tagline">2026 • NOTICIAS OFICIALES</p>
    </div>
</header>

<main>
    <div class="filters">
        <button class="filter-btn active" data-filter="all">TODAS</button>
        <button class="filter-btn" data-filter="noticia"><i class="fas fa-newspaper"></i> NOTICIA</button>
        <button class="filter-btn" data-filter="oficial"><i class="fas fa-check-circle"></i> OFICIAL</button>
        <button class="filter-btn" data-filter="rumor"><i class="fas fa-microphone-alt"></i> RUMOR</button>
        <button class="filter-btn" data-filter="informacion">📡 INFORMACIÓN</button>
        <button class="filter-btn" data-filter="curiosidades">🧠 CURIOSIDADES</button>
        <button class="filter-btn" data-filter="ediciones">💎 EDICIONES</button>
        <button class="filter-btn" data-filter="review"><i class="fas fa-star"></i> REVIEW</button>
        <button class="filter-btn" data-filter="mapas">🗺️ MAPAS</button>
        <button class="filter-btn" data-filter="clases">🎖️ CLASES</button>
        <button class="filter-btn" data-filter="armas">🔫 ARMAS</button>
        <button class="filter-btn" data-filter="modos">🎮 MODOS</button>
        <button class="filter-btn" data-filter="warzone">🪂 WARZONE</button>
        <button class="filter-btn" data-filter="skins">🎨 SKINS</button>
    </div>

    <div class="news-grid" id="newsGrid">
        <div class="loader"><i class="fas fa-circle-notch"></i> Cargando noticias...</div>
    </div>

    <button id="loadMoreBtn" class="load-more"><i class="fas fa-arrow-down"></i> MOSTRAR MÁS</button>
</main>

<footer>
    <p>Modern Warfare 4 © 2026 - Fan Blog no oficial | <i class="fas fa-skull"></i> Task Force 141</p>
</footer>

<script>
    // Configuración
    const POSTS_URL = 'https://raw.githubusercontent.com/DastanFC/MW4/main/posts.json';
    
    let allPosts = [];
    let visiblePosts = 8;
    let currentFilter = 'all';

    async function loadPosts() {
        const grid = document.getElementById('newsGrid');
        try {
            const response = await fetch(POSTS_URL + '?t=' + new Date().getTime());
            if (!response.ok) throw new Error('No se pudo cargar posts.json');
            allPosts = await response.json();
            renderPosts();
        } catch (error) {
            console.error('Error:', error);
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:2rem;"><i class="fas fa-exclamation-triangle"></i> Error cargando noticias.</div>';
            document.getElementById('loadMoreBtn').style.display = 'none';
        }
    }

    function getFilteredPosts() {
        if (currentFilter === 'all') return allPosts;
        return allPosts.filter(post => post.tag === currentFilter);
    }

    function formatDate(dateString) {
        const date = new Date(dateString);
        const ahora = new Date();
        const diff = Math.floor((ahora - date) / (1000 * 60 * 60 * 24));
        
        if (diff === 0) return 'Hoy';
        if (diff === 1) return 'Ayer';
        if (diff < 7) return `Hace ${diff} días`;
        return date.toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function truncateText(text, maxLength = 80) {
        if (!text) return '';
        const cleanText = text.replace(/<[^>]*>/g, '');
        if (cleanText.length <= maxLength) return cleanText;
        return cleanText.substring(0, maxLength) + '...';
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function showPostDetail(postId) {
        window.location.href = `post.html?id=${postId}`;
    }

    function renderPosts() {
        const grid = document.getElementById('newsGrid');
        const filtered = getFilteredPosts();
        const postsToShow = filtered.slice(0, visiblePosts);
        
        if (postsToShow.length === 0 && filtered.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:2rem;"><i class="fas fa-skull"></i> No hay noticias aún.</div>';
            document.getElementById('loadMoreBtn').style.display = 'none';
            return;
        }
        
        if (postsToShow.length === 0 && filtered.length > 0) {
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:2rem;"><i class="fas fa-filter"></i> No hay noticias con este filtro</div>';
            document.getElementById('loadMoreBtn').style.display = 'none';
            return;
        }
        
        grid.innerHTML = postsToShow.map((post, index) => {
            const tagClass = {
                'oficial':      'tag-oficial',
                'noticia':      'tag-noticia',
                'rumor':        'tag-rumor',
                'review':       'tag-review',
                'mapas':        'tag-mapas',
                'clases':       'tag-clases',
                'armas':        'tag-armas',
                'modos':        'tag-modos',
                'warzone':      'tag-warzone',
                'dmz':          'tag-dmz',
                'campana':      'tag-campana',
                'skins':        'tag-skins',
                'informacion':  'tag-informacion',
                'curiosidades': 'tag-curiosidades',
                'ediciones':    'tag-ediciones'
            }[post.tag] || 'tag-noticia';
            
            const tagIcon = {
                'oficial':      '✓',
                'noticia':      '📰',
                'rumor':        '🔮',
                'review':       '⭐',
                'mapas':        '🗺️',
                'clases':       '🎖️',
                'armas':        '🔫',
                'modos':        '🎮',
                'warzone':      '🪂',
                'dmz':          '🏴',
                'campana':      '⚔️',
                'skins':        '🎨',
                'informacion':  '📡',
                'curiosidades': '🧠',
                'ediciones':    '💎'
            }[post.tag] || '📰';

            const updatedBadge = post.updated
                ? `<div class="updated-badge">🔄 Actualizado</div>`
                : '';
            
            return `
                <div class="news-card" data-id="${post.id}" style="animation-delay: ${index * 0.05}s">
                    <div class="image-container">
                        ${updatedBadge}
                        <img class="card-image" src="${post.image || 'https://via.placeholder.com/400x180/1a1a1a/4caf50?text=MW4'}" alt="${escapeHtml(post.title)}" loading="lazy"
                             onerror="this.src='https://via.placeholder.com/400x180/1a1a1a/4caf50?text=MW4'">
                    </div>
                    <div class="card-content">
                        <span class="card-tag ${tagClass}">${tagIcon} ${post.tag.toUpperCase()}</span>
                        <h3 class="card-title">${escapeHtml(post.title)}</h3>
                        <div class="card-date"><i class="far fa-calendar-alt"></i> ${formatDate(post.date)}</div>
                        <p class="card-excerpt">${escapeHtml(truncateText(post.excerpt || post.content, 80))}</p>
                    </div>
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.news-card').forEach(card => {
            card.addEventListener('click', () => {
                const postId = parseInt(card.dataset.id);
                showPostDetail(postId);
            });
        });
        
        const loadBtn = document.getElementById('loadMoreBtn');
        if (visiblePosts >= filtered.length) {
            loadBtn.style.display = 'none';
        } else {
            loadBtn.style.display = 'block';
        }
    }

    document.getElementById('loadMoreBtn').addEventListener('click', () => {
        visiblePosts += 4;
        renderPosts();
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            visiblePosts = 8;
            renderPosts();
        });
    });

    loadPosts();
</script>

</body>
</html>
