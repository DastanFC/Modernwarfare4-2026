<main>

    <!-- ===== BANNER (reemplaza src con tu imagen 1500x500) ===== -->
    <div class="site-banner" id="siteBannerWrapper" style="display:none">
        <a href="#" id="bannerLink" target="_blank" rel="noopener">
            <img id="bannerImg" src="" alt="Modern Warfare 4 – Banner">
        </a>
    </div>

    <!-- ===== ÚLTIMA HORA ===== -->
    <div class="breaking-bar" id="breakingBar" style="display:none">
        <div class="breaking-label"><span class="dot"></span> ÚLTIMA HORA</div>
        <div class="breaking-scroll-wrap">
            <div class="breaking-ticker" id="breakingTicker"></div>
        </div>
    </div>

    <div class="filters-wrapper">
        <div class="search-bar">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="search-input" id="searchInput" placeholder="Buscar noticias...">
            <button class="search-clear" id="searchClear" title="Limpiar">✕</button>
        </div>
        <button class="filter-toggle" id="filterToggle">
            <i class="fas fa-filter"></i>&nbsp;FILTRAR POR CATEGORÍA
            <i class="fas fa-chevron-down chev"></i>
        </button>
        <div class="filters" id="filtersContainer">
            <button class="filter-btn active" data-filter="all">TODAS <span class="count" id="count-all">0</span></button>
            <button class="filter-btn" data-filter="noticia">📰 NOTICIA <span class="count" id="count-noticia">0</span></button>
            <button class="filter-btn" data-filter="oficial">✓ OFICIAL <span class="count" id="count-oficial">0</span></button>
            <button class="filter-btn" data-filter="rumor">🔮 RUMOR <span class="count" id="count-rumor">0</span></button>
            <button class="filter-btn" data-filter="informacion">📡 INFORMACIÓN <span class="count" id="count-informacion">0</span></button>
            <button class="filter-btn" data-filter="curiosidades">🧠 CURIOSIDADES <span class="count" id="count-curiosidades">0</span></button>
            <button class="filter-btn" data-filter="ediciones">💎 EDICIONES <span class="count" id="count-ediciones">0</span></button>
            <button class="filter-btn" data-filter="review">⭐ REVIEW <span class="count" id="count-review">0</span></button>
            <button class="filter-btn" data-filter="mapas">🗺️ MAPAS <span class="count" id="count-mapas">0</span></button>
            <button class="filter-btn" data-filter="clases">🎖️ CLASES <span class="count" id="count-clases">0</span></button>
            <button class="filter-btn" data-filter="armas">🔫 ARMAS <span class="count" id="count-armas">0</span></button>
            <button class="filter-btn" data-filter="modos">🎮 MODOS <span class="count" id="count-modos">0</span></button>
            <button class="filter-btn" data-filter="warzone">🪂 WARZONE <span class="count" id="count-warzone">0</span></button>
            <button class="filter-btn" data-filter="skins">🎨 SKINS <span class="count" id="count-skins">0</span></button>
        </div>
    </div>

    <div class="news-grid" id="newsGrid"></div>
    <button id="loadMoreBtn" class="load-more" style="display:none"><i class="fas fa-arrow-down"></i> MOSTRAR MÁS</button>
</main>

<footer>
    <p>Modern Warfare 4 © 2026 - Fan Blog no oficial | <i class="fas fa-skull"></i> Task Force 141</p>
    <p style="margin-top:0.5rem;">
        <a href="https://twitter.com/MW4esp" target="_blank" rel="noopener" style="color:#4caf50;text-decoration:none;font-weight:700;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle;margin-right:3px"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622z"/></svg>
            @MW4esp
        </a>
    </p>
</footer>

<button class="scroll-top" id="scrollTop" title="Volver arriba">
    <i class="fas fa-chevron-up"></i>
</button>

<script>
    const POSTS_URL = 'https://raw.githubusercontent.com/DastanFC/MW4/main/posts.json';
    let allPosts = [], visiblePosts = 8, currentFilter = 'all', searchQuery = '';

    function updateLastUpdateTime() {
        const now = new Date();
        document.getElementById('lastUpdateTime').textContent =
            now.toLocaleDateString('es-ES', { day:'numeric', month:'short' }) +
            ' · ' + now.toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' });
    }

    function updateCounts() {
        ['all','noticia','oficial','rumor','informacion','curiosidades','ediciones','review','mapas','clases','armas','modos','warzone','skins'].forEach(cat => {
            const el = document.getElementById('count-' + cat);
            if (!el) return;
            const n = cat === 'all' ? allPosts.length : allPosts.filter(p => p.tag === cat).length;
            el.textContent = n;
            el.style.display = n === 0 ? 'none' : '';
        });
        const tc = document.getElementById('totalCount');
        if (tc) tc.textContent = allPosts.length;
    }

    function formatDate(ds) {
        const date = new Date(ds), diff = Math.floor((Date.now() - date) / 86400000);
        if (diff === 0) return 'Hoy'; if (diff === 1) return 'Ayer'; if (diff < 7) return `Hace ${diff} días`;
        return date.toLocaleDateString('es-ES', { day:'numeric', month:'short', year:'numeric' });
    }
    function isNew(ds) { return (Date.now() - new Date(ds)) < 86400000; }
    function truncateText(text, max = 80) {
        if (!text) return ''; const clean = text.replace(/<[^>]*>/g,'');
        return clean.length <= max ? clean : clean.substring(0, max) + '...';
    }
    function escapeHtml(text) { if (!text) return ''; const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }
    function showPostDetail(id) { window.location.href = `post.html?id=${id}`; }

    function renderSkeletons(n = 8) {
        return Array.from({length:n}, () => `<div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line s"></div><div class="skeleton-line t"></div><div class="skeleton-line m"></div><div class="skeleton-line f"></div><div class="skeleton-line m"></div></div></div>`).join('');
    }

    function shareTwitter(e, postId, title) {
        e.stopPropagation();
        const url = `${location.origin}${location.pathname}post.html?id=${postId}`;
        const text = encodeURIComponent(`${title} #MW4 #ModernWarfare4`);
        window.open(`https://twitter.com/intent/tweet?text=${text}&url=${encodeURIComponent(url)}&via=MW4esp`, '_blank', 'noopener');
    }

    function sharePost(e, postId, title) {
        e.stopPropagation();
        const url = `${location.origin}${location.pathname}post.html?id=${postId}`;
        const btn = e.currentTarget;
        if (navigator.share) { navigator.share({ title, url }).catch(()=>{}); }
        else {
            navigator.clipboard.writeText(url).then(() => {
                btn.classList.add('copied'); btn.innerHTML = '<i class="fas fa-check"></i> Copiado';
                setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = '<i class="fas fa-link"></i> Copiar enlace'; }, 2000);
            });
        }
    }

    const TAG_CLASS = {'oficial':'tag-oficial','noticia':'tag-noticia','rumor':'tag-rumor','review':'tag-review','mapas':'tag-mapas','clases':'tag-clases','armas':'tag-armas','modos':'tag-modos','warzone':'tag-warzone','dmz':'tag-dmz','campana':'tag-campana','skins':'tag-skins','informacion':'tag-informacion','curiosidades':'tag-curiosidades','ediciones':'tag-ediciones'};
    const TAG_ICON  = {'oficial':'✓','noticia':'📰','rumor':'🔮','review':'⭐','mapas':'🗺️','clases':'🎖️','armas':'🔫','modos':'🎮','warzone':'🪂','dmz':'🏴','campana':'⚔️','skins':'🎨','informacion':'📡','curiosidades':'🧠','ediciones':'💎'};

    function getFilteredPosts() {
        let posts = currentFilter === 'all' ? allPosts : allPosts.filter(p => p.tag === currentFilter);
        if (searchQuery) { const q = searchQuery.toLowerCase(); posts = posts.filter(p => (p.title||'').toLowerCase().includes(q)||(p.excerpt||'').toLowerCase().includes(q)||(p.content||'').toLowerCase().includes(q)); }
        return posts;
    }

    function renderPosts() {
        const grid = document.getElementById('newsGrid');
        const filtered = getFilteredPosts(), postsToShow = filtered.slice(0, visiblePosts);
        if (postsToShow.length === 0) {
            const msg = searchQuery ? `<i class="fas fa-search"></i> Sin resultados para "<strong>${escapeHtml(searchQuery)}</strong>"` : (currentFilter !== 'all' ? '<i class="fas fa-filter"></i> No hay noticias con este filtro' : '<i class="fas fa-skull"></i> No hay noticias aún.');
            grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:2rem;">${msg}</div>`;
            document.getElementById('loadMoreBtn').style.display = 'none'; return;
        }
        grid.innerHTML = postsToShow.map((post, i) => {
            const tc = TAG_CLASS[post.tag]||'tag-noticia', ti = TAG_ICON[post.tag]||'📰';
            const updBadge = post.updated ? `<div class="updated-badge">🔄 Actualizado</div>` : '';
            const newBadge = isNew(post.date) ? `<div class="new-badge">NUEVO</div>` : '';

            if (post.flash) {
                const optImg = post.image ? `<img class="flash-opt-img" src="${escapeHtml(post.image)}" alt="" loading="lazy" onerror="this.style.display='none'">` : '';
                const flashContent = (post.content||post.excerpt||'').replace(/<[^>]*>/g,'');
                return `<div class="news-card flash-card" data-id="${post.id}" style="animation-delay:${i*0.05}s">
                    <div class="image-container"></div>
                    <div class="flash-body">
                        <div class="flash-header">
                            <div class="flash-avatar"><img src="https://dastanfc.github.io/MW4/favicon.png" alt="MW4" onerror="this.style.display='none';this.parentElement.textContent='🎮'"></div>
                            <div class="flash-account">
                                <div class="flash-account-name">Modern Warfare 4 - Noticias en Español</div>
                                <div class="flash-account-handle">@MW4esp</div>
                            </div>
                            <div class="flash-badge">⚡ FLASH</div>
                        </div>
                        <div class="flash-text">${post.content || escapeHtml(post.excerpt) || ''}</div>
                        ${optImg}
                        <div class="flash-footer">
                            <div class="flash-footer-left">
                                <span class="card-tag ${tc}">${ti} ${post.tag.toUpperCase()}</span>
                                <div class="card-date"><i class="far fa-calendar-alt"></i> ${formatDate(post.date)}</div>
                            </div>
                            <div class="flash-footer-right">
                                <button class="share-btn" data-id="${post.id}" data-title="${escapeHtml(post.title)}"><i class="fas fa-link"></i> Copiar</button>
                                <button class="twitter-share-btn" data-id="${post.id}" data-title="${escapeHtml(post.title)}"><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622z"/></svg> Twittear</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            }

            return `<div class="news-card" data-id="${post.id}" style="animation-delay:${i*0.05}s">
                <div class="image-container">${updBadge}${newBadge}
                    <img class="card-image" src="${post.image||'https://via.placeholder.com/400x180/1a1a1a/4caf50?text=MW4'}" alt="${escapeHtml(post.title)}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x180/1a1a1a/4caf50?text=MW4'">
                </div>
                <div class="card-content">
                    <span class="card-tag ${tc}">${ti} ${post.tag.toUpperCase()}</span>
                    <h3 class="card-title">${escapeHtml(post.title)}</h3>
                    <div class="card-date"><i class="far fa-calendar-alt"></i> ${formatDate(post.date)}</div>
                    <p class="card-excerpt">${escapeHtml(truncateText(post.excerpt||post.content,80))}</p>
                    <div class="card-share">
                        <button class="share-btn" data-id="${post.id}" data-title="${escapeHtml(post.title)}"><i class="fas fa-link"></i> Copiar</button>
                        <button class="twitter-share-btn" data-id="${post.id}" data-title="${escapeHtml(post.title)}"><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622z"/></svg> Twittear</button>
                    </div>
                </div>
            </div>`;
        }).join('');
        grid.querySelectorAll('.news-card').forEach(c => c.addEventListener('click', () => showPostDetail(parseInt(c.dataset.id))));
        grid.querySelectorAll('.share-btn').forEach(b => b.addEventListener('click', e => sharePost(e, b.dataset.id, b.dataset.title)));
        grid.querySelectorAll('.twitter-share-btn').forEach(b => b.addEventListener('click', e => shareTwitter(e, b.dataset.id, b.dataset.title)));
        document.getElementById('loadMoreBtn').style.display = visiblePosts >= filtered.length ? 'none' : 'block';
    }

    async function loadPosts() {
        document.getElementById('newsGrid').innerHTML = renderSkeletons(8);
        try {
            const r = await fetch(POSTS_URL + '?t=' + Date.now());
            if (!r.ok) throw new Error();
            allPosts = await r.json();
            updateCounts(); updateLastUpdateTime(); renderPosts(); initBreakingNews();
        } catch {
            document.getElementById('newsGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:2rem;"><i class="fas fa-exclamation-triangle"></i> Error cargando noticias.</div>';
            document.getElementById('loadMoreBtn').style.display = 'none';
        }
    }

    document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); currentFilter = btn.dataset.filter; visiblePosts = 8; renderPosts();
    }));
    document.getElementById('loadMoreBtn').addEventListener('click', () => { visiblePosts += 4; renderPosts(); });

    const filterToggle = document.getElementById('filterToggle');
    const filtersContainer = document.getElementById('filtersContainer');
    filterToggle.addEventListener('click', () => {
        const open = filtersContainer.classList.toggle('open');
        filterToggle.classList.toggle('open', open);
    });

    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');
    searchInput.addEventListener('input', () => {
        searchQuery = searchInput.value.trim();
        searchClear.classList.toggle('visible', searchQuery.length > 0);
        visiblePosts = 8; renderPosts();
    });
    searchClear.addEventListener('click', () => {
        searchInput.value = ''; searchQuery = ''; searchClear.classList.remove('visible'); visiblePosts = 8; renderPosts();
    });

    const scrollTopBtn = document.getElementById('scrollTop');
    window.addEventListener('scroll', () => scrollTopBtn.classList.toggle('visible', window.scrollY > 400), { passive: true });
    scrollTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    // ===== BANNER CONFIG =====
    // Para activar el banner: pon la URL de tu imagen y (opcional) enlace de destino
    const BANNER_CONFIG = {
        enabled: true,           // ← cambia a true para mostrar el banner
        image: 'https://i.imgur.com/2w5hpc7.png',                // ← URL de tu imagen 1500x500 (ej: 'https://i.imgur.com/2w5hpc7.png')
        link: 'https://dastanfc.github.io/MW4/',                // ← URL a la que lleva al hacer clic (o '#' para ninguno)
        openInNewTab: true
    };
    function initBanner() {
        if (!BANNER_CONFIG.enabled || !BANNER_CONFIG.image) return;
        const wrapper = document.getElementById('siteBannerWrapper');
        const img     = document.getElementById('bannerImg');
        const link    = document.getElementById('bannerLink');
        img.src = BANNER_CONFIG.image;
        link.href = BANNER_CONFIG.link;
        if (!BANNER_CONFIG.openInNewTab) link.removeAttribute('target');
        if (BANNER_CONFIG.link === '#') link.style.cursor = 'default';
        wrapper.style.display = '';
    }
    initBanner();

    // ===== ÚLTIMA HORA =====
    function initBreakingNews() {
        const recent = allPosts.filter(p => (Date.now() - new Date(p.date)) < 43200000);
        if (recent.length === 0) return;

        const bar    = document.getElementById('breakingBar');
        const ticker = document.getElementById('breakingTicker');

        // Altura fija para el wrap basada en el font-size
        ticker.style.height = '22px';

        // Crear un item por cada post reciente
        ticker.innerHTML = recent.map((p, i) =>
            `<span class="breaking-item" data-id="${p.id}">${p.title}</span>`
        ).join('');

        const items = ticker.querySelectorAll('.breaking-item');
        items.forEach(el =>
            el.addEventListener('click', () => showPostDetail(parseInt(el.dataset.id)))
        );

        bar.style.display = '';

        let current = 0;
        function showNext() {
            // Quitar clase active del anterior
            items.forEach(el => {
                el.classList.remove('active');
                el.style.animation = 'none';
                // forzar reflow para reiniciar animación
                void el.offsetWidth;
            });
            const el = items[current];
            el.style.animation = '';
            el.classList.add('active');
            current = (current + 1) % items.length;
        }

        showNext();
        // Cada 4s coincide con la duración de breakingFade
        setInterval(showNext, 4000);
    }

    loadPosts();
</script>
</body>
</html>
